services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finqz-pro-api
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://finqz_user:finqz_password@postgres:5432/finqz_pro_dev?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-staging-jwt-secret
      JWT_REFRESH_SECRET: change-me-staging-refresh-secret
      CORS_ORIGIN: http://localhost:5173
    command: node dist/server.js
    restart: unless-stopped
    networks:
      - finqz_pro_network

  nginx:
    image: nginx:1.27-alpine
    container_name: finqz-pro-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - finqz_pro_network

  postgres:
    image: postgres:16-alpine
    container_name: finqz-pro-postgres
    environment:
      POSTGRES_USER: finqz_user
      POSTGRES_PASSWORD: finqz_password
      POSTGRES_DB: finqz_pro_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - finqz_pro_network

  redis:
    image: redis:7-alpine
    container_name: finqz-pro-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - finqz_pro_network

volumes:
  postgres_data:
  redis_data:

networks:
  finqz_pro_network:
