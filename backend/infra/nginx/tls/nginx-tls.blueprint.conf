# FINQZ PRO — TLS NGINX Blueprint
#
# Blueprint somente para producao futura.
# Nao montar este arquivo no docker-compose local antes de existir:
# - dominio oficial
# - certificados validos
# - porta 443 publicada
# - plano de rollback validado
#
# O nginx.conf ativo permanece HTTP-only para preservar localhost.

events {}

http {
    upstream finqz_api {
        server api:4000;
    }

    # HTTP entrypoint.
    # Fase inicial com ACME pode manter /.well-known/acme-challenge em HTTP.
    # Depois da validacao completa, habilitar redirect para HTTPS.
    server {
        listen 80;
        server_name app.example.com;

        client_max_body_size 10M;

        # Exemplo futuro para ACME/Let's Encrypt, se Certbot for usado.
        # location /.well-known/acme-challenge/ {
        #     root /var/www/certbot;
        # }

        # Redirect futuro. Ativar somente apos certificado valido.
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # Compatibilidade temporaria durante rollout controlado.
        location / {
            proxy_pass http://finqz_api;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }
    }

    # HTTPS entrypoint futuro.
    # Substituir app.example.com e caminhos de certificado por valores reais.
    server {
        listen 443 ssl http2;
        server_name app.example.com;

        client_max_body_size 10M;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS futuro. Ativar somente depois de HTTPS valido e rollback testado.
        # Nao usar preload na primeira ativacao.
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://finqz_api;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }
    }
}
