name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment for protected release gates.
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      release_tag:
        description: Optional tag to use when publishing a manual GitHub Release.
        required: false
        type: string
      publish_github_release:
        description: Create a draft GitHub Release after the release checks pass.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  CI_POSTGRES_USER: finqz_user
  CI_POSTGRES_PASSWORD: finqz_password
  RELEASE_POSTGRES_DB: finqz_pro_release

jobs:
  release-preflight:
    name: Release / Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}

    env:
      DATABASE_URL: "postgresql://${{ env.CI_POSTGRES_USER }}:${{ env.CI_POSTGRES_PASSWORD }}@localhost:5432/${{ env.RELEASE_POSTGRES_DB }}?schema=public"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build frontend artifact
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: finqz-pro-frontend-dist
          path: dist
          if-no-files-found: error
          retention-days: 14

      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma client
        working-directory: backend
        run: npm run db:generate

      - name: Validate Prisma schema
        working-directory: backend
        run: npx prisma validate

      - name: Build backend artifact
        working-directory: backend
        run: npm run build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: finqz-pro-backend-dist
          path: |
            backend/dist
            backend/prisma/schema.prisma
            backend/package.json
            backend/package-lock.json
          if-no-files-found: error
          retention-days: 14

  docker-release-build:
    name: Release / Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - release-preflight

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build release backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: finqz-pro-api:release-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Release / Draft GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - release-preflight
      - docker-release-build
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_github_release) }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="${{ inputs.release_tag }}"
          fi

          if [[ -z "${release_tag}" ]]; then
            echo "release_tag is required when publishing a manual GitHub Release."
            exit 1
          fi

          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.release.outputs.tag }}" >/dev/null 2>&1; then
            echo "::notice title=Release exists::GitHub Release ${{ steps.release.outputs.tag }} already exists."
          else
            gh release create "${{ steps.release.outputs.tag }}" \
              --draft \
              --generate-notes \
              --title "FINQZ PRO ${{ steps.release.outputs.tag }}"
          fi
